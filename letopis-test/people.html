</nav></div></header><main class="archive-page"><section class="archive-hero"><div><div class="kicker">Биографии рода</div><h1>Лица рода</h1><p>Здесь можно быстро найти человека, увидеть основные сведения, открыть документы и вернуться к его месту в родословном древе.</p></div><div class="stats"><div class="stat"><b id="statPeople">—</b><span>человек</span></div><div class="stat"><b id="statFamilies">—</b><span>родовых линий</span></div><div class="stat"><b id="statSources">—</b><span>PDF-источников</span></div></div></section><section class="tools"><input id="archiveSearch" class="search-archive" placeholder="Поиск по имени, фамилии, месту…"/><button class="family-filter active" data-family="all">Все</button></section><section class="layout"><aside class="list" id="personList"></aside><article class="card" id="personCard"></article></section></main><script src="data/people.js"></script><script>
let active=location.hash?location.hash.slice(1):people[0].id,filter='all',q='';const list=document.getElementById('personList'),card=document.getElementById('personCard');function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function block(title,arr){if(!arr||!arr.length)return'';return `<div class="block"><h3>${title}</h3>${Array.isArray(arr[0])?`<div class="timeline">${arr.map(x=>`<div><b>${esc(x[0])}</b><span>${esc(x[1])}</span></div>`).join('')}</div>`:`<ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}</div>`}function families(){return [...new Set(people.map(p=>p.family).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru'))}function initFilters(){const tools=document.querySelector('.tools');families().forEach(f=>{const b=document.createElement('button');b.className='family-filter';b.dataset.family=f;b.textContent=f;tools.appendChild(b)});document.querySelectorAll('.family-filter').forEach(b=>b.onclick=()=>{filter=b.dataset.family;document.querySelectorAll('.family-filter').forEach(x=>x.classList.toggle('active',x===b));render()})}function getFiltered(){const s=q.toLowerCase();return people.filter(p=>(filter==='all'||p.family===filter)&&(!s||JSON.stringify(p).toLowerCase().includes(s)))}function renderList(){const items=getFiltered();if(!items.find(p=>p.id===active)&&items[0])active=items[0].id;list.innerHTML=items.map(p=>`<button class="item ${p.id===active?'active':''}" data-id="${p.id}"><span class="mini-portrait ${p.photo?'':'empty'}">${p.photo?`<img src="${p.photo}" alt="${esc(p.name)}">`:''}</span><span><strong>${esc(p.name)}</strong><small>${esc(p.years||'—')} · ${esc(p.family)}${p.role?' · '+esc(p.role):''}</small></span></button>`).join('')||'<p>Ничего не найдено.</p>';document.querySelectorAll('.item').forEach(b=>b.onclick=()=>{active=b.dataset.id;location.hash=active;render()})}function renderCard(){const p=people.find(x=>x.id===active)||getFiltered()[0];if(!p){card.innerHTML='<p>Выберите друг <script>
(function(){
  // Back navigation helper
  function addBackButton(){
    const page = location.pathname.toLowerCase().split('/').pop() || 'index.html';
    if(page === 'index.html' && !location.pathname.toLowerCase().includes('/book/')) return;
    if(document.querySelector('.page-back')) return;
    const a = document.createElement('a');
    a.href = '#';
    a.className = 'page-back';
    a.innerHTML = '<span class="back-arrow">←</span><span>Назад</span>';
    const fallback = location.pathname.toLowerCase().includes('/book/') ? '../index.html' : 'index.html';
    a.addEventListener('click', function(e){
      e.preventDefault();
      if(window.history.length > 1){ window.history.back(); }
      else { location.href = fallback; }
    });
    document.body.appendChild(a);
  }

  // Click-to-enlarge images. For maps, use the linked full file and allow zoom.
  function initLightbox(){
    const selector = '.gallery a img, .book-page a img, .book-page img, .gallery-preview img, .unknown-photo-grid img, .memory-map-image, img.zoomable';
    const imgs = Array.from(document.querySelectorAll(selector)).filter(img => img.closest('.image-lightbox') === null);
    if(!imgs.length) return;
    imgs.forEach(img => img.classList.add('lightboxable'));

    let box = document.querySelector('.image-lightbox');
    if(!box){
      box = document.createElement('div');
      box.className = 'image-lightbox';
      box.innerHTML = '<div class="lightbox-tools"><button class="lightbox-zoom" type="button">100%</button><button class="lightbox-open" type="button">↗</button></div><button class="lightbox-close" aria-label="Закрыть">×</button><img alt=""/><div class="lightbox-caption"></div>';
      document.body.appendChild(box);
    }

    const boxImg = box.querySelector('img');
    const boxCap = box.querySelector('.lightbox-caption');
    const zoomBtn = box.querySelector('.lightbox-zoom');
    const openBtn = box.querySelector('.lightbox-open');
    let currentSrc = '';
    let zoomed = false;

    function close(){
      box.classList.remove('open','map-mode','zoomed');
      boxImg.removeAttribute('src');
      boxCap.textContent = '';
      currentSrc = '';
      zoomed = false;
      zoomBtn.textContent = '100%';
    }

    function setZoom(next){
      zoomed = next;
      box.classList.toggle('zoomed', zoomed);
      zoomBtn.textContent = zoomed ? 'По экрану' : '100%';
    }

    imgs.forEach(img => {
      img.addEventListener('click', function(e){
        e.preventDefault();
        const link = img.closest('a');
        const src = img.getAttribute('data-full') || link?.getAttribute('href') || img.currentSrc || img.src;
        currentSrc = src;
        boxImg.src = src;
        boxImg.alt = img.alt || '';
        const figure = img.closest('figure');
        const cap = figure?.querySelector('figcaption')?.textContent?.trim() || img.alt || '';
        boxCap.textContent = cap;

        const isMap = img.classList.contains('memory-map-image') || src.includes('memory-map') || img.alt.toLowerCase().includes('карта');
        box.classList.toggle('map-mode', isMap);
        setZoom(false);
        box.classList.add('open');
      });
    });

    zoomBtn.addEventListener('click', function(e){
      e.stopPropagation();
      setZoom(!zoomed);
    });

    openBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(currentSrc) window.open(currentSrc, '_blank', 'noopener');
    });

    box.addEventListener('click', function(e){ if(e.target === box) close(); });
    box.querySelector('.lightbox-close').addEventListener('click', close);
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') close(); });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ addBackButton(); initLightbox(); });
  } else {
    addBackButton(); initLightbox();
  }
})();
</script>

<script>
(function(){
  function fixPeopleMobileFilters(){
    if(!window.matchMedia || !window.matchMedia('(max-width: 760px)').matches) return;

    const candidates = [
      '.family-filter',
      '.family-filters',
      '.people-filter',
      '.people-filters',
      '.filters',
      '.filter-bar',
      '.chips',
      '.tabs',
      '.family-tabs'
    ];

    let filters = null;
    for(const selector of candidates){
      const el = document.querySelector(selector);
      if(el && el.querySelector('button, a, [data-family], [data-filter]')){
        filters = el;
        break;
      }
    }

    if(!filters) return;

    filters.classList.add('people-mobile-family-bar');

    const hero = document.querySelector('.people-hero, .page-hero, .section-title, h1');
    if(hero){
      const parentSection = hero.closest('section') || hero.parentElement;
      if(parentSection && filters.parentElement !== parentSection){
        parentSection.appendChild(filters);
      }
    }

    // Make clicked filter stay visible in the horizontal bar.
    filters.addEventListener('click', function(e){
      const target = e.target.closest('button, a');
      if(!target) return;
      setTimeout(()=>target.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'}), 50);
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', fixPeopleMobileFilters);
  }else{
    fixPeopleMobileFilters();
  }
  window.addEventListener('resize', fixPeopleMobileFilters);
})();
</script>

<script>
/* v3.32 — final clean mobile logic for Лица рода
   Фамилии = only filter. Person item = opens information. */
(function(){
  function isMobile(){ return window.matchMedia && window.matchMedia('(max-width:760px)').matches; }
  function cleanText(s){ return (s || '').replace(/\s+/g,' ').trim(); }
  function ensurePeopleMobile(){
    if(!isMobile() || typeof people === 'undefined') return;
    document.body.classList.add('people-v32-mobile');
    document.body.classList.remove('people-detail-open');

    const tools = document.querySelector('.tools');
    if(!tools) return;

    let toggle = document.querySelector('.people-v32-family-toggle');
    let menu = document.querySelector('.people-v32-family-menu');
    let backdrop = document.querySelector('.people-v32-family-backdrop');

    const familyNames = ['Все'].concat([...new Set(people.map(p=>p.family).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru')));

    if(!toggle){
      toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'people-v32-family-toggle';
      toggle.innerHTML = '<span>Фамилии</span><b>⌄</b>';
      const search = document.getElementById('archiveSearch');
      if(search && search.parentNode === tools) search.insertAdjacentElement('afterend', toggle);
      else tools.prepend(toggle);
    }

    if(!backdrop){
      backdrop = document.createElement('div');
      backdrop.className = 'people-v32-family-backdrop';
      document.body.appendChild(backdrop);
    }

    if(!menu){
      menu = document.createElement('div');
      menu.className = 'people-v32-family-menu';
      menu.setAttribute('aria-label','Фильтр по фамилии');
      menu.innerHTML = familyNames.map((name,i)=>'<button type="button" data-family-name="'+name.replace(/"/g,'&quot;')+'" class="'+(i===0?'active':'')+'">'+name+'</button>').join('');
      document.body.appendChild(menu);
    }

    function openMenu(){
      menu.classList.add('open');
      backdrop.classList.add('open');
      toggle.classList.add('open');
      toggle.querySelector('b').textContent = '×';
    }
    function closeMenu(){
      menu.classList.remove('open');
      backdrop.classList.remove('open');
      toggle.classList.remove('open');
      toggle.querySelector('b').textContent = '⌄';
    }
    function showList(){
      document.body.classList.remove('people-detail-open');
      const list = document.getElementById('personList');
      if(list) setTimeout(()=>list.scrollIntoView({behavior:'smooth', block:'start'}), 30);
    }
    function showDetail(){
      document.body.classList.add('people-detail-open');
      const card = document.getElementById('personCard');
      if(card) setTimeout(()=>card.scrollIntoView({behavior:'smooth', block:'start'}), 30);
    }
    function ensureBackButton(){
      const card = document.getElementById('personCard');
      if(!card) return;
      let back = card.querySelector('.people-v32-back');
      if(!back){
        back = document.createElement('button');
        back.type = 'button';
        back.className = 'people-v32-back';
        back.textContent = '← К списку людей';
        back.addEventListener('click', showList);
        card.prepend(back);
      }
    }

    // Patch render once: after every render, restore back button and stay in list unless person was tapped.
    if(typeof render === 'function' && !window.__peopleV32RenderPatched){
      const originalRender = render;
      render = function(){ originalRender(); ensureBackButton(); };
      window.__peopleV32RenderPatched = true;
      render();
    }else{
      ensureBackButton();
    }

    if(!toggle.dataset.v32Wired){
      toggle.dataset.v32Wired='1';
      toggle.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        menu.classList.contains('open') ? closeMenu() : openMenu();
      });
      backdrop.addEventListener('click', closeMenu);
    }

    if(!menu.dataset.v32Wired){
      menu.dataset.v32Wired='1';
      menu.querySelectorAll('button').forEach(btn=>{
        btn.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          const value = btn.dataset.familyName;
          if(typeof filter !== 'undefined') filter = value === 'Все' ? 'all' : value;
          menu.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          toggle.querySelector('span').textContent = value === 'Все' ? 'Все фамилии' : value;
          if(typeof render === 'function') render();
          showList();
          closeMenu();
        });
      });
    }

    const list = document.getElementById('personList');
    if(list && !list.dataset.v32Wired){
      list.dataset.v32Wired='1';
      list.addEventListener('click', function(e){
        const item = e.target.closest('.item');
        if(!item) return;
        // Existing onclick chooses active person and renders. Then we reveal the info panel.
        setTimeout(showDetail, 70);
      }, true);
    }

    const search = document.getElementById('archiveSearch');
    if(search && !search.dataset.v32Wired){
      search.dataset.v32Wired='1';
      search.addEventListener('input', function(){ setTimeout(showList, 40); });
    }
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ensurePeopleMobile);
  else ensurePeopleMobile();
})();
</script>
</body></html>

<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=people.html"><title>Документы</title></head><body><p><a href="people.html">Открыть раздел «Люди»</a></p><script>
(function(){
  const fullPath = location.pathname.toLowerCase();
  const file = (fullPath.split('/').pop() || 'index.html');
  const inBook = fullPath.includes('/book/');
  document.querySelectorAll('.nav a').forEach(a=>{
    const raw = (a.getAttribute('href') || '').toLowerCase();
    const clean = raw.replace(/^\.?\/?/,'').replace(/^\.\.\//,'');
    let active = false;
    if(!inBook && file === 'index.html' && clean === 'index.html') active = true;
    if(file === 'tree.html' && clean === 'tree.html') active = true;
    if(file === 'people.html' && clean === 'people.html') active = true;
    if(file === 'archive.html' && clean === 'archive.html') active = true;
    if(file === 'gallery.html' && clean === 'gallery.html') active = true;
    if(file === 'map.html' && clean === 'map.html') active = true;
    if(file === 'full-book.html' && clean === 'book/index.html') active = true;
    if(inBook && (raw === 'index.html' || clean === 'book/index.html')) active = true;
    if(active){
      a.classList.add('active');
      a.setAttribute('aria-current','page');
    }
  });
})();
</script>
<script>
(function(){
  // Back navigation helper
  function addBackButton(){
    const page = location.pathname.toLowerCase().split('/').pop() || 'index.html';
    if(page === 'index.html' && !location.pathname.toLowerCase().includes('/book/')) return;
    if(document.querySelector('.page-back')) return;
    const a = document.createElement('a');
    a.href = '#';
    a.className = 'page-back';
    a.innerHTML = '<span class="back-arrow">←</span><span>Назад</span>';
    const fallback = location.pathname.toLowerCase().includes('/book/') ? '../index.html' : 'index.html';
    a.addEventListener('click', function(e){
      e.preventDefault();
      if(window.history.length > 1){ window.history.back(); }
      else { location.href = fallback; }
    });
    document.body.appendChild(a);
  }

  // Click-to-enlarge images. For maps, use the linked full file and allow zoom.
  function initLightbox(){
    const selector = '.gallery a img, .book-page a img, .book-page img, .gallery-preview img, .unknown-photo-grid img, .memory-map-image, img.zoomable';
    const imgs = Array.from(document.querySelectorAll(selector)).filter(img => img.closest('.image-lightbox') === null);
    if(!imgs.length) return;
    imgs.forEach(img => img.classList.add('lightboxable'));

    let box = document.querySelector('.image-lightbox');
    if(!box){
      box = document.createElement('div');
      box.className = 'image-lightbox';
      box.innerHTML = '<div class="lightbox-tools"><button class="lightbox-zoom" type="button">100%</button><button class="lightbox-open" type="button">↗</button></div><button class="lightbox-close" aria-label="Закрыть">×</button><img alt=""/><div class="lightbox-caption"></div>';
      document.body.appendChild(box);
    }

    const boxImg = box.querySelector('img');
    const boxCap = box.querySelector('.lightbox-caption');
    const zoomBtn = box.querySelector('.lightbox-zoom');
    const openBtn = box.querySelector('.lightbox-open');
    let currentSrc = '';
    let zoomed = false;

    function close(){
      box.classList.remove('open','map-mode','zoomed');
      boxImg.removeAttribute('src');
      boxCap.textContent = '';
      currentSrc = '';
      zoomed = false;
      zoomBtn.textContent = '100%';
    }

    function setZoom(next){
      zoomed = next;
      box.classList.toggle('zoomed', zoomed);
      zoomBtn.textContent = zoomed ? 'По экрану' : '100%';
    }

    imgs.forEach(img => {
      img.addEventListener('click', function(e){
        e.preventDefault();
        const link = img.closest('a');
        const src = img.getAttribute('data-full') || link?.getAttribute('href') || img.currentSrc || img.src;
        currentSrc = src;
        boxImg.src = src;
        boxImg.alt = img.alt || '';
        const figure = img.closest('figure');
        const cap = figure?.querySelector('figcaption')?.textContent?.trim() || img.alt || '';
        boxCap.textContent = cap;

        const isMap = img.classList.contains('memory-map-image') || src.includes('memory-map') || img.alt.toLowerCase().includes('карта');
        box.classList.toggle('map-mode', isMap);
        setZoom(false);
        box.classList.add('open');
      });
    });

    zoomBtn.addEventListener('click', function(e){
      e.stopPropagation();
      setZoom(!zoomed);
    });

    openBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(currentSrc) window.open(currentSrc, '_blank', 'noopener');
    });

    box.addEventListener('click', function(e){ if(e.target === box) close(); });
    box.querySelector('.lightbox-close').addEventListener('click', close);
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') close(); });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ addBackButton(); initLightbox(); });
  } else {
    addBackButton(); initLightbox();
  }
})();
</script>
</body></html>

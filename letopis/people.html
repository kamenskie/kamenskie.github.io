<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Люди — Каменские</title><link href="assets/style.css" rel="stylesheet"/><style>
.archive-page{background:linear-gradient(180deg,#fff9ef,#f4e7d5);min-height:100vh;padding-top:82px;color:#2d241b}.archive-hero{max-width:1180px;margin:0 auto;padding:52px 22px 26px;display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:32px;align-items:end}.kicker{font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:#9d6f38;margin-bottom:14px}.archive-hero h1{font-size:clamp(44px,7vw,84px);line-height:.92;margin:0;font-family:Georgia,serif;font-weight:500}.archive-hero p{font-size:20px;line-height:1.58;color:#66584b;margin:20px 0 0;max-width:760px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.stat{background:#fff8ec;border:1px solid #e2cfb4;border-radius:20px;padding:18px;box-shadow:0 12px 34px rgba(75,54,34,.07)}.stat b{display:block;font-size:32px;line-height:1;color:#8b5722}.stat span{font-size:12px;color:#766654;text-transform:uppercase;letter-spacing:.12em}.tools{max-width:1180px;margin:0 auto 22px;padding:0 22px;display:flex;gap:10px;flex-wrap:wrap}.search-archive{flex:1;min-width:260px;border:1px solid #e2cfb4;background:#fffaf1;border-radius:999px;padding:13px 18px;font-size:16px;outline:none}.family-filter{border:1px solid #e2cfb4;background:#fffaf1;border-radius:999px;padding:10px 13px;color:#4b321e;cursor:pointer}.family-filter.active{background:#2b1e15;color:#fff;border-color:#2b1e15}.layout{max-width:1180px;margin:0 auto;padding:0 22px 72px;display:grid;grid-template-columns:330px 1fr;gap:22px}.list{position:sticky;top:92px;align-self:start;max-height:calc(100vh - 116px);overflow:auto;background:rgba(255,250,241,.86);border:1px solid #e2cfb4;border-radius:22px;padding:12px;box-shadow:0 18px 50px rgba(75,54,34,.07)}.item{display:grid;grid-template-columns:42px 1fr;gap:10px;width:100%;text-align:left;border:0;background:transparent;border-radius:15px;padding:10px;cursor:pointer;color:#2d241b}.item:hover,.item.active{background:rgba(201,154,85,.16)}.mini-portrait{width:42px;height:42px;border-radius:50%;overflow:hidden;background:#efe0c9;border:1px solid #e2cfb4;display:grid;place-items:center}.mini-portrait img{width:100%;height:100%;object-fit:cover}.mini-portrait.empty:after{content:"";width:14px;height:14px;border:1px solid #9c7a55;border-radius:50%}.item strong{display:block;font-family:Georgia,serif;font-size:15.5px;line-height:1.18;overflow-wrap:break-word}.item small{display:block;color:#766654;margin-top:3px;line-height:1.3;overflow-wrap:break-word}.card{background:#fffaf1;border:1px solid #e2cfb4;border-radius:28px;padding:clamp(22px,4vw,46px);box-shadow:0 22px 70px rgba(75,54,34,.09)}.card-head{display:grid;grid-template-columns:150px 1fr;gap:24px;align-items:start}.photo{width:150px;height:200px;border-radius:18px;overflow:hidden;background:#efe0c9;box-shadow:0 16px 46px rgba(80,57,30,.12);display:grid;place-items:center;color:#7d6c59;text-align:center;padding:16px;box-sizing:border-box}.photo img{width:100%;height:100%;object-fit:cover}.card h2{font-size:clamp(34px,4.4vw,58px);line-height:1.02;margin:0 0 12px;color:#2b1e15;overflow-wrap:break-word}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}.chip{border:1px solid #e2cfb4;background:#fff;border-radius:999px;padding:7px 11px;color:#6b583f;font-size:14px}.summary{font-size:19px;line-height:1.6;color:#4d3d2f;margin:0 0 28px;max-width:820px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}.block{border-top:1px solid #e2cfb4;padding-top:17px}.block h3{font-size:12px;font-family:Arial,sans-serif;text-transform:uppercase;letter-spacing:.16em;color:#9c6f37;margin:0 0 12px}.block ul{margin:0;padding-left:18px;color:#544434;line-height:1.55}.block li{margin-bottom:7px}.timeline{display:grid;gap:10px}.timeline div{display:grid;grid-template-columns:150px 1fr;gap:12px;line-height:1.45}.timeline b{color:#3e2d1f;font-weight:600}.timeline span{color:#5f5042;overflow-wrap:break-word}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:30px}.actions a{text-decoration:none;border:1px solid #d7b27d;border-radius:13px;padding:12px 15px;color:#57391a;background:#fff6e5}.source-note{font-size:13px;color:#7a6b5e;margin-top:22px;line-height:1.5}@media(max-width:900px){.archive-page{padding-top:0}.archive-hero{grid-template-columns:1fr;padding-top:38px}.layout{grid-template-columns:1fr}.list{position:relative;top:auto;max-height:330px}.grid{grid-template-columns:1fr}.card-head{grid-template-columns:1fr}.photo{width:120px;height:150px}.timeline div{grid-template-columns:1fr;gap:2px}.stats{grid-template-columns:repeat(3,1fr)}}@media(max-width:620px){.stats{grid-template-columns:1fr}.tools{display:block}.search-archive{width:100%;box-sizing:border-box;margin-bottom:10px}.family-filter{margin:0 6px 8px 0}.archive-hero h1{font-size:46px}}
</style></head><body><header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html">Книга Жизни <small>Родовой Щит Каменских</small></a><nav class="nav">
<a href="index.html">Главная</a>
<a href="tree.html">Древо</a>
<a href="people.html">Люди</a>
<a href="book/index.html">Книга</a>
<a href="gallery.html">Фотолетопись рода</a>
<a href="archive.html">Архив</a>
<a href="map.html">Карта</a>
</nav></div></header><main class="archive-page"><section class="archive-hero"><div><div class="kicker">Страницы людей</div><h1>Люди</h1><p>Здесь можно быстро найти человека, увидеть основные сведения, открыть документы и вернуться к его месту в родословном древе.</p></div><div class="stats"><div class="stat"><b id="statPeople">—</b><span>человек</span></div><div class="stat"><b id="statFamilies">—</b><span>родовых линий</span></div><div class="stat"><b id="statSources">—</b><span>PDF-источников</span></div></div></section><section class="tools"><input id="archiveSearch" class="search-archive" placeholder="Поиск по имени, фамилии, месту…"/><button class="family-filter active" data-family="all">Все</button></section><section class="layout"><aside class="list" id="personList"></aside><article class="card" id="personCard"></article></section></main><script src="data/people.js"></script><script>
let active=location.hash?location.hash.slice(1):people[0].id,filter='all',q='';const list=document.getElementById('personList'),card=document.getElementById('personCard');function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function block(title,arr){if(!arr||!arr.length)return'';return `<div class="block"><h3>${title}</h3>${Array.isArray(arr[0])?`<div class="timeline">${arr.map(x=>`<div><b>${esc(x[0])}</b><span>${esc(x[1])}</span></div>`).join('')}</div>`:`<ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}</div>`}function families(){return [...new Set(people.map(p=>p.family).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ru'))}function initFilters(){const tools=document.querySelector('.tools');families().forEach(f=>{const b=document.createElement('button');b.className='family-filter';b.dataset.family=f;b.textContent=f;tools.appendChild(b)});document.querySelectorAll('.family-filter').forEach(b=>b.onclick=()=>{filter=b.dataset.family;document.querySelectorAll('.family-filter').forEach(x=>x.classList.toggle('active',x===b));render()})}function getFiltered(){const s=q.toLowerCase();return people.filter(p=>(filter==='all'||p.family===filter)&&(!s||JSON.stringify(p).toLowerCase().includes(s)))}function renderList(){const items=getFiltered();if(!items.find(p=>p.id===active)&&items[0])active=items[0].id;list.innerHTML=items.map(p=>`<button class="item ${p.id===active?'active':''}" data-id="${p.id}"><span class="mini-portrait ${p.photo?'':'empty'}">${p.photo?`<img src="${p.photo}" alt="${esc(p.name)}">`:''}</span><span><strong>${esc(p.name)}</strong><small>${esc(p.years||'—')} · ${esc(p.family)}${p.role?' · '+esc(p.role):''}</small></span></button>`).join('')||'<p>Ничего не найдено.</p>';document.querySelectorAll('.item').forEach(b=>b.onclick=()=>{active=b.dataset.id;location.hash=active;render()})}function renderCard(){const p=people.find(x=>x.id===active)||getFiltered()[0];if(!p){card.innerHTML='<p>Выберите другую линию или измените поиск.</p>';return}card.innerHTML=`<div class="card-head"><div class="photo">${p.photo?`<img src="${p.photo}" alt="${esc(p.name)}">`:'Фотография пока не найдена'}</div><div><div class="kicker">${esc(p.family||'')}</div><h2>${esc(p.name)}</h2><div class="meta">${p.years?`<span class="chip">${esc(p.years)}</span>`:''}${p.role?`<span class="chip">${p.clergy?'✝ ':''}${esc(p.role)}</span>`:''}${p.repressed?'<span class="chip">★ репрессирован</span>':''}</div>${p.summary?`<p class="summary">${esc(p.summary)}</p>`:''}</div></div><div class="grid">${block('Связи',p.relations)}${block('Образование',p.education)}${block('Рукоположение / сан',p.ordination)}${block('Служение',p.service)}${block('Награды',p.awards)}${block('Преследования',p.repressions)}${block('События',p.events)}${block('Места',p.places)}</div><div class="actions">${p.chapterUrl?`<a href="${p.chapterUrl}">Читать главу</a>`:''}${p.sourceUrl?`<a href="${p.sourceUrl}" target="_blank" rel="noopener">Документы</a>`:''}<a href="#${p.id}">История жизни</a><a href="tree.html?person=${p.id}">Показать в древе</a></div><div class="source-note">Страница собрана по документам и семейным материалам. Подробный рассказ сохранён в книге.</div>`}function render(){renderList();renderCard()}document.getElementById('archiveSearch').addEventListener('input',e=>{q=e.target.value;render()});document.getElementById('statPeople').textContent=people.length;document.getElementById('statFamilies').textContent=families().length;document.getElementById('statSources').textContent=new Set(people.map(p=>p.sourceUrl).filter(Boolean)).size;initFilters();render();
</script><script>
(function(){
  const fullPath = location.pathname.toLowerCase();
  const file = (fullPath.split('/').pop() || 'index.html');
  const inBook = fullPath.includes('/book/');
  document.querySelectorAll('.nav a').forEach(a=>{
    const raw = (a.getAttribute('href') || '').toLowerCase();
    const clean = raw.replace(/^\.?\/?/,'').replace(/^\.\.\//,'');
    let active = false;
    if(!inBook && file === 'index.html' && clean === 'index.html') active = true;
    if(file === 'tree.html' && clean === 'tree.html') active = true;
    if(file === 'people.html' && clean === 'people.html') active = true;
    if(file === 'archive.html' && clean === 'archive.html') active = true;
    if(file === 'gallery.html' && clean === 'gallery.html') active = true;
    if(file === 'map.html' && clean === 'map.html') active = true;
    if(file === 'full-book.html' && clean === 'book/index.html') active = true;
    if(inBook && (raw === 'index.html' || clean === 'book/index.html')) active = true;
    if(active){
      a.classList.add('active');
      a.setAttribute('aria-current','page');
    }
  });
})();
</script>
<script>
(function(){
  // Back navigation helper
  function addBackButton(){
    const page = location.pathname.toLowerCase().split('/').pop() || 'index.html';
    if(page === 'index.html' && !location.pathname.toLowerCase().includes('/book/')) return;
    if(document.querySelector('.page-back')) return;
    const a = document.createElement('a');
    a.href = '#';
    a.className = 'page-back';
    a.innerHTML = '<span class="back-arrow">←</span><span>Назад</span>';
    const fallback = location.pathname.toLowerCase().includes('/book/') ? '../index.html' : 'index.html';
    a.addEventListener('click', function(e){
      e.preventDefault();
      if(window.history.length > 1){ window.history.back(); }
      else { location.href = fallback; }
    });
    document.body.appendChild(a);
  }

  // Click-to-enlarge images. For maps, use the linked full file and allow zoom.
  function initLightbox(){
    const selector = '.gallery a img, .book-page a img, .book-page img, .gallery-preview img, .unknown-photo-grid img, .memory-map-image, img.zoomable';
    const imgs = Array.from(document.querySelectorAll(selector)).filter(img => img.closest('.image-lightbox') === null);
    if(!imgs.length) return;
    imgs.forEach(img => img.classList.add('lightboxable'));

    let box = document.querySelector('.image-lightbox');
    if(!box){
      box = document.createElement('div');
      box.className = 'image-lightbox';
      box.innerHTML = '<div class="lightbox-tools"><button class="lightbox-zoom" type="button">100%</button><button class="lightbox-open" type="button">↗</button></div><button class="lightbox-close" aria-label="Закрыть">×</button><img alt=""/><div class="lightbox-caption"></div>';
      document.body.appendChild(box);
    }

    const boxImg = box.querySelector('img');
    const boxCap = box.querySelector('.lightbox-caption');
    const zoomBtn = box.querySelector('.lightbox-zoom');
    const openBtn = box.querySelector('.lightbox-open');
    let currentSrc = '';
    let zoomed = false;

    function close(){
      box.classList.remove('open','map-mode','zoomed');
      boxImg.removeAttribute('src');
      boxCap.textContent = '';
      currentSrc = '';
      zoomed = false;
      zoomBtn.textContent = '100%';
    }

    function setZoom(next){
      zoomed = next;
      box.classList.toggle('zoomed', zoomed);
      zoomBtn.textContent = zoomed ? 'По экрану' : '100%';
    }

    imgs.forEach(img => {
      img.addEventListener('click', function(e){
        e.preventDefault();
        const link = img.closest('a');
        const src = img.getAttribute('data-full') || link?.getAttribute('href') || img.currentSrc || img.src;
        currentSrc = src;
        boxImg.src = src;
        boxImg.alt = img.alt || '';
        const figure = img.closest('figure');
        const cap = figure?.querySelector('figcaption')?.textContent?.trim() || img.alt || '';
        boxCap.textContent = cap;

        const isMap = img.classList.contains('memory-map-image') || src.includes('memory-map') || img.alt.toLowerCase().includes('карта');
        box.classList.toggle('map-mode', isMap);
        setZoom(false);
        box.classList.add('open');
      });
    });

    zoomBtn.addEventListener('click', function(e){
      e.stopPropagation();
      setZoom(!zoomed);
    });

    openBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(currentSrc) window.open(currentSrc, '_blank', 'noopener');
    });

    box.addEventListener('click', function(e){ if(e.target === box) close(); });
    box.querySelector('.lightbox-close').addEventListener('click', close);
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') close(); });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ addBackButton(); initLightbox(); });
  } else {
    addBackButton(); initLightbox();
  }
})();
</script>
</body></html>
